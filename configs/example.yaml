experiment_id: example_experiment

model:
  name: meta-llama/Meta-Llama-3-8B
  dtype: float16
  device: cuda

dataset:
  eval_path: data/eval/my_dataset.csv           # columns: prompt, target [, false1, false2, false3]
  positive_prompts_path: data/prompts/pos.txt   # one prompt per line
  negative_prompts_path: data/prompts/neg.txt

sweep:
  formulation: both             # mcf | cf | both
  layers: null                  # null = all layers, or e.g. [10, 15, 20, 25]
  coef_list: [-20, -10, -5, 5, 10, 20]
  token_position: last          # last | mean
  normalize_vector: false
  norm_type: unit               # unit | std  (only if normalize_vector: true)
  task_prefix: question         # question | goal | fill_in_the_blank | continuation
  cf_normalization: character   # none | token | character | pmi
  num_shots: 5
  fewshot_source: ""            # path to data/fewshots/*.yaml (empty = zero-shot)
  shuffle_choices: true
  layer_name_pattern: "model.layers.{layer_idx}"
  max_length: 2048
  verbose_every: 20
  resume: true

output:
  base_dir: results/
