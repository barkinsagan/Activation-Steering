experiment_id: exp_20260413_anatomy_llama1b_pilot

model:
  name: meta-llama/Llama-3.2-1B
  dtype: float16
  device: cuda

dataset:
  eval_path: data/eval/anatomy_sweep_150.csv
  positive_prompts_path: data/prompts/anatomy_pos.txt
  negative_prompts_path: data/prompts/anatomy_neg.txt

sweep:
  formulation: both
  layers: [8, 12, 16]          # 3 layers — just enough to see layer variation
  coef_list: [-5, 0, 5]        # baseline + both directions
  token_position: last
  normalize_vector: false
  task_prefix: question
  cf_normalization: character
  num_shots: 5
  fewshot_source: data/fewshots/anatomy_fewshot.yaml
  shuffle_choices: true
  layer_name_pattern: "model.layers.{layer_idx}"
  max_length: 2048
  resume: true
  verbose_every: 10

output:
  base_dir: results/
